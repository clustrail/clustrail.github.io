name: deploy

on:
  push:
    branches: [main]
  # Rebuild when a binary release is published here, so release-derived
  # content (e.g. the future changelog page) stays current.
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let a queued newer deploy supersede an older one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Ensure GitHub Pages is enabled (source: GitHub Actions) before deploying.
      # `enablement: true` self-heals the "Pages not enabled -> deploy-pages 404"
      # failure: if Pages is ever turned off, the next run re-enables it (uses the
      # workflow token's pages: write) instead of leaving the site 404ing.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: corepack enable
      - run: corepack prepare pnpm@11.5.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        # Authenticates the build-time GitHub Releases fetch (the changelog +
        # latest-version badge) so it isn't subject to the anonymous rate limit.
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
